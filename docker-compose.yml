version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: addiin_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: addiin
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/addiin.sql:/docker-entrypoint-initdb.d/addiin.sql
    networks:
      - addiin_network

  app:
    build: .
    container_name: addiin_app
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: addiin
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:8000
    networks:
      - addiin_network

networks:
  addiin_network:
    driver: bridge

volumes:
  mysql_data: